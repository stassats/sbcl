name: Mac

on: [push]

jobs:
  build:

    runs-on: ${{ matrix.arch == 'arm64' && 'macos-15' || 'macos-15-intel' }}
    timeout-minutes: 60
    strategy:
      matrix:
        arch: [x86-64]
        options: [--with-sb-thread --with-nonstop-foreign-call, --with-mark-region-gc --with-nonstop-foreign-call]
      fail-fast: false

    steps:
    - uses: actions/checkout@v1
    - name: instal host sbcl
      run: brew install sbcl
    - name: build
      env:
        SBCL_MAKE_JOBS: -j4
        SBCL_MAKE_TARGET_2_OPTIONS: --disable-ldb --disable-debugger
      run: ./make.sh ${{ matrix.options }} --with-sb-core-compression --xc-host='sbcl --lose-on-corruption --disable-ldb --disable-debugger'
    - name: test
      run: ./run-sbcl.sh --lose-on-corruption --disable-ldb --disable-debugger --eval '(load (compile-file "gen.lisp"))' --eval '(main :noise t)'
